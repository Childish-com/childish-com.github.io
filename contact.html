    <h1>Contact Me</h1>
    <div class ="contact info">
         <h4>Treyjames9000@gmail.com</h4>
        <h4>(347)-662-0000</h4>
    </div>

    <form action="#" method="post">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required><br><br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br><br>
        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="4" required></textarea><br><br>
        <input type="submit" value="Send">
    </form>
    <h1>Survey</h1>
    <form action="#" method="post">
        <p>What is your favorite game genre?</p>
        <input type="radio" id="action" name="genre" value="action">
        <label for="action">Action</label><br>
        <input type="radio" id="rpg" name="genre" value="rpg">
        <label for="rpg">RPG</label><br>
        <input type="radio" id="strategy" name="genre" value="strategy">
        <label for="strategy">Strategy</label><br>
        <input type="radio" id="puzzle" name="genre" value="puzzle">
        <label for="puzzle">Puzzle</label><br><br>
        <p>How did you hear about my portfolio?</p>
        <select name="source">
            <option value="friend">Friend</option>
            <option value="social">Social Media</option>
            <option value="search">Search Engine</option>
            <option value="other">Other</option>
        </select><br><br>
        <input type="submit" value="Submit Survey">
    </form>
</body>
